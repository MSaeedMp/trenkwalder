name: trenkwalder-chatbot

services:
  backend:
    container_name: trenkwalder-backend
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DOCS_DIR=/app/docs
      - VECTOR_STORE_PATH=/tmp/trenkwalder-lancedb
    volumes:
      - ./backend/app:/app/app
      - ./backend/pipelines:/app/pipelines
      - ./backend/mcp_server:/app/mcp_server
      - ./backend/docs:/app/docs
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  frontend:
    container_name: trenkwalder-frontend
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    environment:
      - NODE_ENV=development
    depends_on:
      backend:
        condition: service_healthy
