name: trenkwalder-chatbot

services:
  backend:
    container_name: trenkwalder-backend
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DOCS_DIR=/app/docs
      - VECTOR_STORE_PATH=/tmp/trenkwalder-lancedb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  frontend:
    container_name: trenkwalder-frontend
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    depends_on:
      backend:
        condition: service_healthy
